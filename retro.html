<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>RETRO TIME</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;background:#111;overflow:hidden;font-family:monospace;}

/* ── SCREENS ── all absolute, toggled by .active class */
.screen{position:fixed;inset:0;display:none;flex-direction:column;background:#fff;}
.screen.active{display:flex;}

/* ── MENU SCREEN ── */
#menuScreen{overflow:hidden;}
#menuTop{background:#000;color:#fff;text-align:center;padding:10px 8px 8px;flex-shrink:0;}
#menuTop h1{font-size:clamp(10px,3.5vw,16px);letter-spacing:3px;margin-bottom:3px;}
#menuTop p{font-size:clamp(7px,2vw,10px);color:#888;letter-spacing:2px;}
#gameGrid{flex:1;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;scrollbar-width:none;}
#gameGrid::-webkit-scrollbar{display:none;}
.gameCard{border:1.5px solid #000;padding:10px 9px 9px;cursor:pointer;background:#fff;position:relative;}
.gameCard:active{background:#000;}
.gameCard:active .gc-name,.gameCard:active .gc-desc{color:#fff;}
.gc-icon{font-size:22px;display:block;margin-bottom:4px;}
.gc-name{font-size:clamp(7px,2.2vw,10px);font-weight:bold;color:#000;display:block;line-height:1.4;}
.gc-desc{font-size:clamp(6px,1.8vw,9px);color:#555;display:block;margin-top:2px;}
.gc-lvl{position:absolute;top:5px;right:6px;font-size:7px;color:#999;}

/* ── LEVEL SELECT ── */
#lvlScreen{background:#fff;}
#lvlHeader{background:#000;color:#fff;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#lvlTitle{font-size:clamp(8px,2.5vw,12px);letter-spacing:1px;}
#lvlBack{background:none;border:1.5px solid #fff;color:#fff;font-family:monospace;font-size:9px;padding:4px 10px;cursor:pointer;}
#lvlGrid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px;align-content:start;}
.lvlBtn{aspect-ratio:1;border:2px solid #000;background:#000;color:#fff;font-family:monospace;font-size:clamp(9px,3vw,14px);font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lvlBtn.locked{background:#ddd;color:#bbb;border-color:#ccc;pointer-events:none;}
.lvlBtn:active{background:#333;}

/* ── GAME SCREEN ── */
#gameScreen{background:#000;}
#gameHUD{background:#000;color:#fff;padding:4px 12px;display:flex;justify-content:space-between;font-size:clamp(8px,2.5vw,12px);letter-spacing:1px;flex-shrink:0;border-bottom:2px solid #333;}
#canvasWrap{flex:1;position:relative;background:#fff;min-height:0;}
#gc{display:block;width:100%;height:100%;image-rendering:pixelated;}
#controls{background:#111;padding:8px 10px 12px;display:flex;justify-content:center;align-items:center;gap:12px;flex-shrink:0;}
.dpad{display:grid;grid-template-columns:44px 44px 44px;grid-template-rows:44px 44px 44px;gap:2px;}
.de{width:44px;height:44px;}
.btn{background:linear-gradient(145deg,#2a2a2a,#1a1a1a);border:2px solid #444;border-radius:7px;color:#ccc;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 #000;touch-action:manipulation;font-family:monospace;}
.btn:active,.btn.pressed{transform:translateY(2px);box-shadow:0 1px 0 #000;background:#333;color:#fff;}
.dpad .btn{width:44px;height:44px;}
.ok-btn{font-size:9px;color:#fff;background:#222;}
.act-btns{display:flex;flex-direction:column;align-items:center;gap:6px;}
.fire-btn{width:58px;height:58px;border-radius:50%;font-size:18px;background:linear-gradient(145deg,#1a1a1a,#111);border-color:#555;}
.sm-btns{display:flex;gap:5px;}
.sm-btn{height:26px;padding:0 10px;font-size:9px;}

/* ── OVERLAYS ── */
.overlay{position:absolute;inset:0;background:rgba(255,255,255,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;font-family:monospace;}
.overlay.show{display:flex;}
.overlay h2{font-size:clamp(12px,4vw,18px);color:#000;}
.overlay p{font-size:clamp(7px,2.2vw,11px);color:#555;}
.ovl-btn{border:2.5px solid #000;background:#000;color:#fff;font-family:monospace;font-size:clamp(7px,2.2vw,10px);padding:9px 20px;cursor:pointer;margin:2px;}
.ovl-btn.out{background:#fff;color:#000;}
.ovl-btn:active{opacity:0.7;}

/* splash */
#splashOverlay{background:#fff;}
#splashIcon{font-size:48px;animation:pop 0.4s ease;}
#splashName{font-size:clamp(10px,3.5vw,16px);color:#000;}
#splashLv{font-size:clamp(9px,3vw,14px);color:#fff;background:#000;padding:6px 18px;}
#splashHint{font-size:clamp(6px,2vw,10px);color:#555;text-align:center;max-width:80%;}
#splashCount{font-size:28px;color:#000;font-weight:bold;animation:pu 0.8s infinite;}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
@keyframes pu{0%,100%{opacity:1;}50%{opacity:0.2;}}

#toast{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:5px 14px;font-size:clamp(6px,2vw,10px);opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:200;}
#toast.on{opacity:1;}
</style>
</head>
<body>

<!-- MENU SCREEN -->
<div id="menuScreen" class="screen active">
  <div id="menuTop">
    <div style="font-size:20px;margin-bottom:4px;">🦕 📱 🕹️</div>
    <h1>RETRO TIME</h1>
    <p>10 CLASSIC MOBILE GAMES</p>
  </div>
  <div id="gameGrid"></div>
</div>

<!-- LEVEL SELECT -->
<div id="lvlScreen" class="screen">
  <div id="lvlHeader">
    <span id="lvlTitle">SELECT LEVEL</span>
    <button id="lvlBack" onclick="showMenu()">✕ BACK</button>
  </div>
  <div id="lvlGrid"></div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div id="gameHUD">
    <span id="hScore">SC:00000</span>
    <span id="hLevel">LV:1</span>
    <span id="hLives">♥♥♥</span>
  </div>
  <div id="canvasWrap">
    <canvas id="gc"></canvas>

    <!-- SPLASH -->
    <div id="splashOverlay" class="overlay">
      <div id="splashIcon">🐍</div>
      <div id="splashName">SNAKE</div>
      <div id="splashLv">LEVEL 1</div>
      <div id="splashHint">EAT FOOD TO GROW</div>
      <div id="splashCount">3</div>
    </div>

    <!-- PAUSE -->
    <div id="pauseOverlay" class="overlay">
      <h2>⏸ PAUSED</h2>
      <div>
        <button class="ovl-btn" onclick="doResume()">▶ RESUME</button>
        <button class="ovl-btn out" onclick="showMenu()">⌂ MENU</button>
      </div>
    </div>

    <!-- GAME OVER -->
    <div id="goOverlay" class="overlay">
      <div style="font-size:28px;">💀</div>
      <h2>GAME OVER</h2>
      <p id="goScore">SCORE: 00000</p>
      <p id="goLevel">LEVEL: 1</p>
      <button class="ovl-btn" onclick="retryGame()">▶ TRY AGAIN</button>
      <button class="ovl-btn out" onclick="showMenu()">⌂ MENU</button>
    </div>

    <div id="toast"></div>
  </div>
  <div id="controls">
    <div class="dpad">
      <div class="de"></div>
      <button class="btn" id="bU" onpointerdown="btnDn('up')" onpointerup="btnUp('up')" onpointercancel="btnUp('up')">▲</button>
      <div class="de"></div>
      <button class="btn" id="bL" onpointerdown="btnDn('left')" onpointerup="btnUp('left')" onpointercancel="btnUp('left')">◀</button>
      <button class="btn ok-btn" onpointerdown="btnDn('ok')" onpointerup="btnUp('ok')">OK</button>
      <button class="btn" id="bR" onpointerdown="btnDn('right')" onpointerup="btnUp('right')" onpointercancel="btnUp('right')">▶</button>
      <div class="de"></div>
      <button class="btn" id="bD" onpointerdown="btnDn('down')" onpointerup="btnUp('down')" onpointercancel="btnUp('down')">▼</button>
      <div class="de"></div>
    </div>
    <div class="act-btns">
      <button class="btn fire-btn" id="bFire" onpointerdown="btnDn('fire')" onpointerup="btnUp('fire')" onpointercancel="btnUp('fire')">⚡</button>
      <div class="sm-btns">
        <button class="btn sm-btn" onpointerdown="btnDn('pause')">⏸</button>
        <button class="btn sm-btn" onclick="showMenu()">⌂</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── CANVAS SETUP ───────────────────────────
const CV = document.getElementById('gc');
const CX = CV.getContext('2d');
let CW = 360, CH = 280;

function fitCanvas() {
  const wrap = document.getElementById('canvasWrap');
  CW = CV.width  = wrap.clientWidth  || 360;
  CH = CV.height = wrap.clientHeight || 280;
}

new ResizeObserver(fitCanvas).observe(document.getElementById('canvasWrap'));

// ─── GLOBALS ────────────────────────────────
const BL='#000',WH='#fff',GR='#555',LG='#888',XG='#ccc';
let GAME=null, LV=1, SC=0, LI=3, PAUSED=false, LOOP=null, GS={}, KEYS={};
const HS = JSON.parse(localStorage.getItem('hs2')||'{}');
const UL = JSON.parse(localStorage.getItem('ul2')||'{}');

const GAMES = [
  {id:'snake',  ico:'🐍', name:'SNAKE',        desc:'Classic grow & eat', maxLv:10},
  {id:'snake2', ico:'🐍', name:'SNAKE II',      desc:'Walls are deadly!',  maxLv:10},
  {id:'snakeX', ico:'🐍', name:'XENZIA',        desc:'Ultimate snake',     maxLv:10},
  {id:'bounce', ico:'⚪', name:'BOUNCE',        desc:'Physics ball',       maxLv:8},
  {id:'space',  ico:'🚀', name:'SPACE IMPACT',  desc:'Shoot-em-up',       maxLv:10},
  {id:'diamond',ico:'💎', name:'DIAMOND RUSH',  desc:'Collect all gems',   maxLv:8},
  {id:'city',   ico:'🏗', name:'CITY BLOXX',    desc:'Stack blocks',       maxLv:8},
  {id:'bounceT',ico:'🔴', name:'BOUNCE TALES',  desc:'Enhanced bounce',    maxLv:8},
  {id:'nfs',    ico:'🚗', name:'NEED 4 SPEED',  desc:'Street racing',      maxLv:6},
  {id:'fifa',   ico:'⚽', name:'FIFA SOCCER',   desc:'Football match',     maxLv:5},
];

const HINTS = {
  snake: ['EAT FOOD TO GROW','FASTER NOW!','OBSTACLES!','MAZE TIME','TWO FOODS','TELEPORTS','ENEMY SNAKE!','MOVING FOOD','SHRINK ZONES','BOSS SNAKE!!'],
  snake2:['WALLS KILL!','SPEED UP!','OBSTACLES','NARROW PATHS','POWER FOOD','SPLIT WALLS','RIVALS!','MOVING FOOD','WARP ZONES','FINAL MAZE!'],
  snakeX:['XENZIA MODE','SPEED BURST','BLOCK MAZE','DARK ZONES','POWER UPS','WARP TILES','ENEMY AI','MOVING GEMS','LAVA TILES','ULTIMATE!!'],
  space: ['SHOOT FIGHTERS','BOMBERS APPEAR','MISSILES!','ASTEROID FIELD','MINI BOSS','SHIELD FOES','TWIN SHIPS','HOMING SHOTS','BLACK HOLE','FINAL BOSS!!'],
  bounce:['JUMP TO GEMS','MOVING PLATFORMS','SPIKES AHEAD','DARK ROOM','WIND ZONE','SHRINK BALL','LAVA FLOOR','MIRROR MAZE'],
  diamond:['COLLECT ALL GEMS','AVOID TRAPS','DARK MAPS','MOVING TRAPS','FAST TRAPS','FAKE FLOORS','LAVA ZONES','BOSS ROOM'],
  city:  ['STACK BLOCKS!','WIND!','NIGHT MODE','EARTHQUAKE!','GLASS BLOCKS','MEGA WIND','COMBO TIME!','FINAL TOWER'],
  bounceT:['TALES MODE!','SPRING JUMPS','WATER ZONES','DARK CAVES','GIANT SPIKES','WIND+SPIKES','ROCKET BOOST','FINAL STAGE'],
  nfs:   ['CITY STREETS','HIGHWAY!','RAIN STORM','NIGHT DRIVE','POLICE CHASE','RACE FINALE!'],
  fifa:  ['1 MIN MATCH','FAST MATCH','PRO AI','TURBO MODE','WORLD CUP!!'],
};

// ─── SCREEN MANAGEMENT ──────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'gameScreen') setTimeout(fitCanvas, 10);
}

function showMenu() {
  stopGame();
  buildMenu();
  showScreen('menuScreen');
}

// ─── MENU ────────────────────────────────────
function buildMenu() {
  const g = document.getElementById('gameGrid');
  g.innerHTML = '';
  GAMES.forEach(gd => {
    const best = HS[gd.id] || 0;
    const stars = best > 500 ? '★★★' : best > 150 ? '★★☆' : best > 30 ? '★☆☆' : '';
    const d = document.createElement('div');
    d.className = 'gameCard';
    d.innerHTML = `<span class="gc-icon">${gd.ico}</span><span class="gc-name">${gd.name}</span><span class="gc-desc">${gd.desc}</span><span class="gc-lvl">${stars||'×'+gd.maxLv}</span>`;
    d.addEventListener('pointerdown', () => openLevelSelect(gd));
    g.appendChild(d);
  });
}

// ─── LEVEL SELECT ────────────────────────────
let _selGame = null;
function openLevelSelect(gd) {
  _selGame = gd;
  document.getElementById('lvlTitle').textContent = gd.ico + ' ' + gd.name;
  const gr = document.getElementById('lvlGrid');
  gr.innerHTML = '';
  const unlocked = UL[gd.id] || 1;
  for (let i = 1; i <= gd.maxLv; i++) {
    const btn = document.createElement('button');
    btn.className = 'lvlBtn' + (i <= unlocked ? '' : ' locked');
    btn.textContent = i;
    if (i <= unlocked) btn.addEventListener('pointerdown', () => { showScreen('gameScreen'); setTimeout(() => startSplash(gd, i), 50); });
    gr.appendChild(btn);
  }
  showScreen('lvlScreen');
}

// ─── SPLASH ──────────────────────────────────
let _sTimer = null;
function startSplash(gd, lv) {
  fitCanvas();
  GAME = gd.id; LV = lv; SC = 0; LI = 3; PAUSED = false;
  hideOverlays();
  updateHUD();
  document.getElementById('splashIcon').textContent = gd.ico;
  document.getElementById('splashName').textContent = gd.name;
  document.getElementById('splashLv').textContent = 'LEVEL ' + lv;
  const h = HINTS[gd.id];
  document.getElementById('splashHint').textContent = (h && h[lv-1]) || 'DIFFICULTY ×'+lv;
  document.getElementById('splashOverlay').classList.add('show');
  let c = 3;
  document.getElementById('splashCount').textContent = c;
  if (_sTimer) clearInterval(_sTimer);
  _sTimer = setInterval(() => {
    c--;
    if (c > 0) { document.getElementById('splashCount').textContent = c; }
    else { clearInterval(_sTimer); document.getElementById('splashOverlay').classList.remove('show'); launchGame(); }
  }, 700);
}

// ─── HUD ─────────────────────────────────────
function updateHUD() {
  document.getElementById('hScore').textContent = 'SC:' + SC.toString().padStart(5,'0');
  document.getElementById('hLevel').textContent = 'LV:' + LV;
  const l = Math.max(0, LI);
  document.getElementById('hLives').textContent = '♥'.repeat(l) + '♡'.repeat(Math.max(0,3-l));
}

function addScore(n) {
  SC += n;
  if (SC > (HS[GAME+'_l'+LV]||0)) { HS[GAME+'_l'+LV]=SC; localStorage.setItem('hs2',JSON.stringify(HS)); }
  if (SC > (HS[GAME]||0)) { HS[GAME]=SC; localStorage.setItem('hs2',JSON.stringify(HS)); }
  updateHUD();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('on'), 1600);
}

// ─── GAME LIFECYCLE ──────────────────────────
function stopGame() {
  if (LOOP) { clearInterval(LOOP); LOOP = null; }
  if (_sTimer) { clearInterval(_sTimer); _sTimer = null; }
  KEYS = {};
}

function hideOverlays() {
  ['splashOverlay','pauseOverlay','goOverlay'].forEach(id => document.getElementById(id).classList.remove('show'));
}

function onDie(restart) {
  LI--;
  updateHUD();
  stopGame();
  if (LI <= 0) { showGameOver(); return; }
  // flash
  let n = 0;
  LOOP = setInterval(() => {
    CX.fillStyle = n%2 ? WH : BL; CX.fillRect(0,0,CW,CH);
    CX.fillStyle = n%2 ? BL : WH; CX.font = 'bold 16px monospace';
    CX.textAlign = 'center'; CX.fillText('OUCH!', CW/2, CH/2);
    CX.textAlign = 'left';
    if (++n > 5) { clearInterval(LOOP); LOOP = null; restart(); }
  }, 90);
}

function onLevelClear(next) {
  stopGame();
  const maxLv = GAMES.find(g => g.id===GAME)?.maxLv || 5;
  if ((UL[GAME]||1) <= LV) { UL[GAME] = LV+1; localStorage.setItem('ul2',JSON.stringify(UL)); }
  addScore(200 * LV);
  showToast('LEVEL ' + LV + ' CLEAR! +' + (200*LV) + 'pts');
  if (LV >= maxLv) { showWin(); return; }
  LV++; updateHUD();
  setTimeout(next, 500);
}

function showGameOver() {
  document.getElementById('goScore').textContent = 'SCORE: ' + SC.toString().padStart(5,'0');
  document.getElementById('goLevel').textContent = 'LEVEL: ' + LV;
  document.getElementById('goOverlay').classList.add('show');
  drawDecoGround();
}

function showWin() {
  hideOverlays();
  fillBG();
  drawDecoGround();
  CX.fillStyle = BL; CX.textAlign = 'center';
  CX.font = 'bold 14px monospace'; CX.fillText('YOU WIN! 🏆', CW/2, CH/2 - 40);
  CX.font = '10px monospace'; CX.fillStyle = GR;
  CX.fillText('ALL LEVELS COMPLETE!', CW/2, CH/2 - 20);
  CX.fillStyle = BL; CX.font = 'bold 11px monospace';
  CX.fillText('SCORE: ' + SC.toString().padStart(5,'0'), CW/2, CH/2);
  CX.font = '24px serif'; CX.fillText('★★★', CW/2, CH/2 + 28);
  CX.textAlign = 'left';
  // auto go menu after 3s
  setTimeout(showMenu, 3000);
}

function retryGame() {
  hideOverlays();
  const gd = GAMES.find(g => g.id===GAME);
  if (gd) startSplash(gd, LV);
}

function doResume() {
  PAUSED = false;
  document.getElementById('pauseOverlay').classList.remove('show');
}

function launchGame() {
  stopGame();
  const launchers = {
    snake:   () => initSnake(false, false),
    snake2:  () => initSnake(true,  false),
    snakeX:  () => initSnake(false, true),
    bounce:  () => initBounce(false),
    bounceT: () => initBounce(true),
    space:   initSpace,
    diamond: initDiamond,
    city:    initCity,
    nfs:     initNFS,
    fifa:    initFifa,
  };
  (launchers[GAME] || launchers.snake)();
}

// ─── DRAW HELPERS ────────────────────────────
function fillBG(c) { CX.fillStyle = c||WH; CX.fillRect(0,0,CW,CH); }
function rnd(n) { return Math.floor(Math.random()*n); }
function star5(cx,cy,r) {
  CX.beginPath();
  for(let i=0;i<10;i++){const ra=i%2?r*0.38:r,a=i*Math.PI/5-Math.PI/2;i?CX.lineTo(cx+ra*Math.cos(a),cy+ra*Math.sin(a)):CX.moveTo(cx+ra*Math.cos(a),cy+ra*Math.sin(a));}
  CX.closePath(); CX.fill();
}
function drawDecoGround() {
  CX.fillStyle = BL; CX.fillRect(0, CH-20, CW, 2);
  CX.fillStyle = LG; for(let i=0;i<CW;i+=16) CX.fillRect(i, CH-18, 8, 1);
  // mini cacti
  [14, 60, 130, 210, CW-50].forEach(x => {
    CX.fillStyle = BL;
    CX.fillRect(x+4, CH-20-14, 4, 14); CX.fillRect(x, CH-20-8, 4, 4);
    CX.fillRect(x+8, CH-20-10, 4, 4);
  });
  // clouds
  [[28,14],[CW-90,20]].forEach(([x,y]) => {
    CX.fillStyle = XG;
    [[2,0],[0,1],[1,1],[2,1],[3,1],[4,1],[1,2],[2,2],[3,2]].forEach(([a,b])=>CX.fillRect(x+a*7,y+b*6,7,6));
  });
}

// ════════════════════════════════════════════
//  SNAKE
// ════════════════════════════════════════════
function initSnake(walls, xen) {
  const speed = Math.max(60, 200 - LV*17);
  const COLS = 20, ROWS = Math.max(10, Math.floor(CH / (CW/COLS)));
  const cw = Math.floor(CW/COLS), ch = Math.floor(CH/ROWS);
  GS = {
    snake: [{x:10,y:Math.floor(ROWS/2)},{x:9,y:Math.floor(ROWS/2)},{x:8,y:Math.floor(ROWS/2)}],
    dir:{x:1,y:0}, nd:{x:1,y:0},
    food:[], obs:[], walls, xen,
    COLS, ROWS, cw, ch,
    twoFood: LV>=5, mvFood: LV>=8,
    enemy: (xen && LV>=7) ? [{x:15,y:3},{x:15,y:4}] : null,
    edir:{x:0,y:1}, tick:0, goal: 15+LV*3
  };
  spawnFood_s();
  if (GS.twoFood) spawnFood_s();
  for (let i=0; i<Math.floor(LV/2); i++) {
    let ox,oy; do{ox=rnd(COLS);oy=rnd(ROWS);}while(GS.snake.some(s=>s.x===ox&&s.y===oy));
    GS.obs.push({x:ox,y:oy});
  }
  LOOP = setInterval(tickSnake, speed);
}

function spawnFood_s() {
  const {COLS,ROWS,snake,obs,food} = GS;
  let f;
  for(let a=0;a<300;a++){
    f={x:rnd(COLS),y:rnd(ROWS)};
    if(!snake.some(s=>s.x===f.x&&s.y===f.y)&&!obs.some(o=>o.x===f.x&&o.y===f.y)&&!food.some(fo=>fo.x===f.x&&fo.y===f.y)) break;
  }
  GS.food.push(f);
}

function tickSnake() {
  if (PAUSED) return;
  const {snake,walls,COLS,ROWS,obs,food,enemy} = GS;
  GS.dir = {...GS.nd}; GS.tick++;
  if (GS.mvFood && GS.tick%7===0) GS.food.forEach(f=>{f.x=(f.x+(Math.random()>.5?1:-1)+COLS)%COLS;f.y=(f.y+(Math.random()>.5?1:-1)+ROWS)%ROWS;});
  const h = {x:snake[0].x+GS.dir.x, y:snake[0].y+GS.dir.y};
  if (walls) { if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS){onDie(()=>initSnake(walls,GS.xen));return;} }
  else { h.x=(h.x+COLS)%COLS; h.y=(h.y+ROWS)%ROWS; }
  if (snake.some(s=>s.x===h.x&&s.y===h.y)||obs.some(o=>o.x===h.x&&o.y===h.y)){onDie(()=>initSnake(walls,GS.xen));return;}
  if (enemy&&enemy.some(s=>s.x===h.x&&s.y===h.y)){onDie(()=>initSnake(walls,GS.xen));return;}
  snake.unshift(h);
  const fi = food.findIndex(f=>f.x===h.x&&f.y===h.y);
  if (fi>=0) {
    food.splice(fi,1); addScore(10+LV*5); spawnFood_s();
    if(GS.twoFood&&food.length<2) spawnFood_s();
    if(snake.length>=GS.goal){onLevelClear(()=>initSnake(walls,GS.xen));return;}
  } else snake.pop();
  if (enemy) {
    const et=food[0]||{x:10,y:5};
    const edx=et.x-enemy[0].x,edy=et.y-enemy[0].y;
    GS.edir=Math.abs(edx)>Math.abs(edy)?{x:Math.sign(edx),y:0}:{x:0,y:Math.sign(edy)};
    const eh={x:(enemy[0].x+GS.edir.x+COLS)%COLS,y:(enemy[0].y+GS.edir.y+ROWS)%ROWS};
    enemy.unshift(eh);
    const efi=food.findIndex(f=>f.x===eh.x&&f.y===eh.y);
    if(efi>=0){food.splice(efi,1);spawnFood_s();}else enemy.pop();
  }
  drawSnake();
}

function drawSnake() {

  CX.fillStyle = XG;
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) CX.fillRect(x*cw+cw/2,y*ch+ch/2,1,1);
  if(walls){CX.strokeStyle=BL;CX.lineWidth=3;CX.strokeRect(1,1,CW-2,CH-2);}

  CX.fillStyle=XG;CX.fillRect(CW-54,3,50,6);CX.fillStyle=BL;CX.fillRect(CW-54,3,50*pct,6);
  CX.font='5px monospace';CX.fillStyle=BL;CX.textAlign='right';CX.fillText('LEN:'+snake.length,CW-2,16);CX.textAlign='left';
}

function initBounce(tales) {
  const dark = LV>=4, wind = LV>=5 ? (LV%2?.22:-.22) : 0;
  const pl = makePlatforms_b();
  GS = {
    ball:{x:28,y:CH-50,vx:0,vy:0,r:11}, pl,
    spikes:makeSpikes_b(pl), gems:makeGems_b(pl),
    springs: tales ? pl.slice(2,4).map(p=>({x:p.x+p.w/2,y:p.y-4,act:false,t:0})) : [],
    goal:pl[pl.length-1], grav:.34+LV*.02, wind, dark, tales, fc:0

  LOOP = setInterval(tickBounce, 28);
}
function makePlatforms_b(){const ps=[{x:0,y:CH-14,w:CW,h:10,mv:false}];let y=CH-58;for(let i=0;i<5+LV;i++){const w=Math.max(44,80-LV*4)+rnd(28);const x=rnd(CW-w-8)+4;const mv=LV>=3&&Math.random()<.3;ps.push({x,y,w,h:8,mv,mx:1+Math.random(),dir:1});y-=36+rnd(26);}return ps;}
function makeSpikes_b(ps){const sp=[];for(let i=1;i<Math.min(LV+1,ps.length);i++)if(Math.random()<.4){const p=ps[i];sp.push({x:p.x+rnd(p.w-12)+6,y:p.y-8});}return sp;}
function makeGems_b(ps){return ps.slice(1).filter(()=>Math.random()<.65).map(p=>({x:p.x+p.w/2,y:p.y-13,col:false}));}
function tickBounce(){
  if(PAUSED)return;const{ball:b,pl,spikes,gems,goal,grav,wind}=GS;GS.fc++;
  b.vy+=grav;b.vx+=wind;b.vx*=.98;b.x+=b.vx;b.y+=b.vy;
  pl.forEach(p=>{if(p.mv){p.x+=p.mx*p.dir;if(p.x<4||p.x+p.w>CW-4)p.dir*=-1;}if(b.x+b.r>p.x&&b.x-b.r<p.x+p.w&&b.y+b.r>p.y&&b.y+b.r<p.y+p.h+Math.abs(b.vy)+2&&b.vy>=0){b.y=p.y-b.r;b.vy=-Math.abs(b.vy)*.7;if(Math.abs(b.vy)<1.8)b.vy=-1.8;}});
  GS.springs.forEach(sp=>{sp.t=Math.max(0,sp.t-1);if(Math.abs(b.x-sp.x)<12&&Math.abs(b.y-sp.y)<14&&sp.t===0){b.vy=-13;sp.act=true;sp.t=18;addScore(5);}if(sp.t===0)sp.act=false;});
  if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);}if(b.x+b.r>CW){b.x=CW-b.r;b.vx=-Math.abs(b.vx);}

  if(gems.every(g=>g.col)&&Math.hypot(b.x-goal.x-goal.w/2,b.y-goal.y)<16){onLevelClear(()=>initBounce(GS.tales));return;}

function initSpace(){

//  DIAMOND RUSH
// ════════════════════════════════════════════
function initDiamond(){
  const W2=20,H2=13,map=makeDMap(W2,H2);
  let px=1,py=1,gems=[],traps=[],goal={x:W2-2,y:H2-2};
  map.forEach((row,y)=>row.forEach((c,x)=>{if(c==='P'){px=x;py=y;map[y][x]='.';}if(c==='d')gems.push({x,y,col:false});if(c==='T')traps.push({x,y,act:true,t:0,spd:Math.max(3,7-LV)});if(c==='G')goal={x,y};}));
  const cs=Math.min(Math.floor(CW/W2),Math.floor(CH/H2));
  GS={map,player:{x:px,y:py},gems,traps,goal,W:W2,H:H2,cs};
  LOOP=setInterval(tickDiamond,90);
}
function makeDMap(W2,H2){const m=Array.from({length:H2},()=>Array(W2).fill('.'));for(let x=0;x<W2;x++){m[0][x]='#';m[H2-1][x]='#';}for(let y=0;y<H2;y++){m[y][0]='#';m[y][W2-1]='#';}const wd=.1+LV*.02;for(let y=1;y<H2-1;y++)for(let x=1;x<W2-1;x++)if(Math.random()<wd&&!(x<3&&y<3)&&!(x>W2-3&&y>H2-3))m[y][x]='#';m[1][1]='P';m[H2-2][W2-2]='G';const gc=4+LV*2;for(let i=0;i<gc;i++){let gx,gy;do{gx=1+rnd(W2-2);gy=1+rnd(H2-2);}while(m[gy][gx]!=='.');m[gy][gx]='d';}for(let i=0;i<LV;i++){let tx,ty;do{tx=2+rnd(W2-4);ty=2+rnd(H2-4);}while(m[ty][tx]!=='.');m[ty][tx]='T';}return m;}
function tickDiamond(){if(PAUSED)return;GS.traps.forEach(t=>{t.t++;if(t.t>=t.spd){t.act=!t.act;t.t=0;}});drawDiamond();}
function moveDiamond(dx,dy){const{map,player,W,H,gems,traps,goal}=GS;const nx=player.x+dx,ny=player.y+dy;if(ny<0||ny>=H||nx<0||nx>=W||map[ny][nx]==='#')return;player.x=nx;player.y=ny;gems.forEach(g=>{if(!g.col&&g.x===nx&&g.y===ny){g.col=true;addScore(20+LV*10);}});if(traps.some(t=>t.act&&t.x===nx&&t.y===ny)){onDie(initDiamond);return;}if(goal.x===nx&&goal.y===ny&&gems.every(g=>g.col)){onLevelClear(initDiamond);}}
function drawDiamond(){
  fillBG();const{map,player,gems,traps,goal,cs,W,H}=GS;
  const ox=Math.max(0,Math.min(W*cs-CW,player.x*cs-CW/2));
  const oy=Math.max(0,Math.min(H*cs-CH,player.y*cs-CH/2));
  map.forEach((row,y)=>row.forEach((c,x)=>{const px2=x*cs-ox,py2=y*cs-oy;if(c==='#'){CX.fillStyle=BL;CX.fillRect(px2,py2,cs,cs);CX.fillStyle=GR;CX.fillRect(px2+1,py2+1,cs-2,2);CX.fillStyle=LG;CX.fillRect(px2+1,py2+1,2,cs-2);}}));
  const ag=gems.every(g=>g.col);const gx2=goal.x*cs-ox,gy2=goal.y*cs-oy;
  CX.fillStyle=ag?BL:LG;CX.fillRect(gx2+2,gy2+2,cs-4,cs-4);

  const t=90-LV*12;

function tickFifa(){
  if(PAUSED)return;const s=GS;const now=Date.now();
  if(now-s.lt>=1000){s.timer--;s.lt=now;if(s.timer<=0){endFifa(s);return;}}

  b.x+=b.vx;b.y+=b.vy;b.vx*=.93;b.vy*=.93;
  if(b.y<10){b.y=10;b.vy=Math.abs(b.vy);}if(b.y>CH-10){b.y=CH-10;b.vy=-Math.abs(b.vy);}
  if(b.x<4&&b.y>CH/2-24&&b.y<CH/2+24){s.aG++;b.x=CW/2;b.y=CH/2;b.vx=0;b.vy=0;showToast('AI SCORES! '+s.pG+'-'+s.aG);return;}
  if(b.x>CW-4&&b.y>CH/2-24&&b.y<CH/2+24){s.pG++;addScore(100);b.x=CW/2;b.y=CH/2;b.vx=0;b.vy=0;showToast('GOAL! ⚽ '+s.pG+'-'+s.aG);return;}
  if(b.x<6)b.vx=Math.abs(b.vx)*.8;if(b.x>CW-6)b.vx=-Math.abs(b.vx)*.8;
  if(Math.hypot(p.x-b.x,p.y-b.y)<14){const dx=b.x-p.x,dy=b.y-p.y,d=Math.hypot(dx,dy)||1;b.vx+=(dx/d)*2.5;b.vy+=(dy/d)*2.5;}
  ai.y+=(b.y-ai.y)*.07;ai.y=Math.max(16,Math.min(CH-16,ai.y));
  if(b.x>CW/3)ai.x+=(b.x-10-ai.x)*.08;else ai.x+=(CW-80-ai.x)*.05;ai.x=Math.max(CW/2,Math.min(CW-10,ai.x));
  if(Math.hypot(ai.x-b.x,ai.y-b.y)<16){const dx=CW/4-b.x,dy=CH/2-b.y,d=Math.hypot(dx,dy)||1;const str=3+LV*.5;b.vx+=(dx/d)*str+(Math.random()-.5)*2;b.vy+=(dy/d)*str+(Math.random()-.5)*2;}
  drawFifa();
}

// ════════════════════════════════════════════
//  INPUT HANDLING
// ════════════════════════════════════════════
const HOLD = {up:null,down:null,left:null,right:null};

function btnDn(btn) {
  const ids = {up:'bU',down:'bD',left:'bL',right:'bR',fire:'bFire'};
  if(ids[btn]) document.getElementById(ids[btn])?.classList.add('pressed');
  handleBtn(btn);
  if (['up','down','left','right'].includes(btn)) {
    if (HOLD[btn]) clearInterval(HOLD[btn]);
    HOLD[btn] = setInterval(() => handleBtn(btn), 110);
  }
}
function btnUp(btn) {
  const ids = {up:'bU',down:'bD',left:'bL',right:'bR',fire:'bFire'};
  if(ids[btn]) document.getElementById(ids[btn])?.classList.remove('pressed');
  if (HOLD[btn]) { clearInterval(HOLD[btn]); HOLD[btn]=null; }
  // stop continuous motion
  if (GAME==='space' && GS.ship && (btn==='up'||btn==='down')) GS.ship.vy=0;
  if (GAME==='nfs' && GS.car && (btn==='up'||btn==='down')) GS.car.vy=0;
}

function handleBtn(btn) {
  if (btn === 'pause') {
    if (!GAME) return;
    PAUSED = !PAUSED;
    document.getElementById('pauseOverlay').classList.toggle('show', PAUSED);
    return;
  }
  if (PAUSED) return;

  // If on game-over screen, retry
  if (document.getElementById('goOverlay').classList.contains('show')) {
    if (btn==='ok'||btn==='fire') retryGame();
    return;
  }
  if (document.getElementById('splashOverlay').classList.contains('show')) return;

  const s = GS;
  // Snake family
  if (['snake','snake2','snakeX'].includes(GAME)) {
    if (btn==='up'&&s.dir?.y!==1)    s.nd={x:0,y:-1};
    else if(btn==='down'&&s.dir?.y!==-1) s.nd={x:0,y:1};
    else if(btn==='left'&&s.dir?.x!==1)  s.nd={x:-1,y:0};
    else if(btn==='right'&&s.dir?.x!==-1)s.nd={x:1,y:0};
    return;
  }
  if ((GAME==='bounce'||GAME==='bounceT') && s.ball) {
    if (btn==='left')  s.ball.vx=Math.max(-6,s.ball.vx-2);
    if (btn==='right') s.ball.vx=Math.min(6,s.ball.vx+2);
    if (btn==='up'||btn==='ok'||btn==='fire') { if(s.ball.vy>-.5) s.ball.vy=-9; }
    return;
  }
  if (GAME==='space' && s.ship) {
    if (btn==='up')   s.ship.vy=-4;
    if (btn==='down') s.ship.vy=4;
    if (btn==='fire'||btn==='ok') s.bullets.push({x:s.ship.x+18,y:s.ship.y});
    return;
  }
  if (GAME==='diamond') {
    if (btn==='up')    moveDiamond(0,-1);
    if (btn==='down')  moveDiamond(0,1);
    if (btn==='left')  moveDiamond(-1,0);
    if (btn==='right') moveDiamond(1,0);
    return;
  }
  if (GAME==='city') {
    if (btn==='ok'||btn==='fire'||btn==='down') dropBlock();
    return;
  }
  if (GAME==='nfs' && s.car) {
    if (btn==='up')   s.car.vy=-3;
    if (btn==='down') s.car.vy=3;
    if (btn==='fire'||btn==='ok') { s.car.boost=22; s.spd=Math.min(12,s.spd+.4); }
    return;
  }
  if (GAME==='fifa' && s.player) {
    const p=s.player;
    if (btn==='up')    p.y=Math.max(12,p.y-9);
    if (btn==='down')  p.y=Math.min(CH-12,p.y+9);
    if (btn==='left')  p.x=Math.max(14,p.x-9);
    if (btn==='right') p.x=Math.min(CW/2-5,p.x+9);
    if (btn==='fire'||btn==='ok') {
      const b2=s.ball,dx=b2.x-p.x,dy=b2.y-p.y,d=Math.hypot(dx,dy)||1;
      b2.vx=(dx/d)*10+(CW-p.x)/CW*6+(Math.random()-.5)*3;
      b2.vy=(dy/d)*8+(Math.random()-.5)*3;
    }
    return;
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right',Enter:'ok',' ':'fire',Escape:'back',p:'pause',P:'pause',z:'fire',Z:'fire'};
  const btn=m[e.key]; if(!btn)return; e.preventDefault();
  if (btn==='back'){showMenu();return;}
  if (!KEYS[btn]) { KEYS[btn]=true; btnDn(btn); }
});
document.addEventListener('keyup', e => {
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right',' ':'fire',z:'fire'};
  const btn=m[e.key]; if(!btn)return;
  KEYS[btn]=false; btnUp(btn);
});

// Swipe on canvas
let _ts=null;
CV.addEventListener('touchstart',e=>{_ts=e.touches[0];e.preventDefault();},{passive:false});
CV.addEventListener('touchend',e=>{
  if(!_ts)return;
  const dx=e.changedTouches[0].clientX-_ts.clientX,dy=e.changedTouches[0].clientY-_ts.clientY;
  if(Math.abs(dx)<12&&Math.abs(dy)<12) handleBtn('fire');
  else if(Math.abs(dx)>Math.abs(dy)) handleBtn(dx>0?'right':'left');
  else handleBtn(dy>0?'down':'up');
  _ts=null; e.preventDefault();
},{passive:false});

// ── INIT ──
buildMenu();
</script>
